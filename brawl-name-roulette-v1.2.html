  @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&display=swap');
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{background:#0248BB;color:#fff;font-family:'Black Han Sans','Arial Black',Arial,sans-serif;overflow-x:hidden;}
  button{-webkit-appearance:none;appearance:none;font-family:'Black Han Sans','Arial Black',Arial,sans-serif;}
  input[type=text]{-webkit-appearance:none;appearance:none;}
  .bb{background:linear-gradient(180deg,#FFE234 0%,#FFB800 60%,#FF8C00 100%);color:#5a2d00;border:3px solid #3d1f00;border-radius:14px;font-weight:900;cursor:pointer;box-shadow:0 5px 0 #8B4500;position:relative;top:0;transition:top .1s,box-shadow .1s;}
  .bb:active{top:3px;box-shadow:0 2px 0 #8B4500;}
  .bb:disabled{background:linear-gradient(180deg,#aaa,#888);color:#555;box-shadow:0 5px 0 #444;border-color:#333;cursor:not-allowed;top:0;}
  .bb2{background:linear-gradient(180deg,#5BC8FF 0%,#2299EE 60%,#0066CC 100%);color:#fff;border:3px solid #003d7a;border-radius:14px;font-weight:900;cursor:pointer;box-shadow:0 5px 0 #003060;position:relative;top:0;transition:top .1s,box-shadow .1s;}
  .bb2:active{top:3px;box-shadow:0 2px 0 #003060;}
  .bbr{background:linear-gradient(180deg,#FF6666 0%,#DD2222 60%,#AA0000 100%);color:#fff;border:3px solid #770000;border-radius:14px;font-weight:900;cursor:pointer;box-shadow:0 5px 0 #550000;position:relative;top:0;transition:top .1s,box-shadow .1s;}
  .bbr:active{top:3px;box-shadow:0 2px 0 #550000;}
  .card{background:linear-gradient(180deg,#1e5fa8,#143d73);border:3px solid #0a2a52;border-radius:18px;box-shadow:0 4px 0 #091e3a,0 6px 20px rgba(0,0,0,.4);}
  .lbl{background:linear-gradient(180deg,#FFE234,#FFB800);color:#5a2d00;border:2px solid #3d1f00;border-radius:8px;padding:4px 14px;font-size:13px;font-weight:900;display:inline-block;box-shadow:0 3px 0 #8B4500;letter-spacing:1px;}
  .tog{width:58px;height:32px;border-radius:16px;border:3px solid #0a2a52;cursor:pointer;position:relative;transition:background .2s;box-shadow:inset 0 2px 4px rgba(0,0,0,.4);flex-shrink:0;}
  .tog-k{width:22px;height:22px;border-radius:50%;background:linear-gradient(180deg,#fff,#ddd);position:absolute;top:2px;transition:left .2s;box-shadow:0 2px 4px rgba(0,0,0,.5);border:1px solid rgba(0,0,0,.2);}
  .ni{width:100%;background:rgba(0,0,0,.35);border:2px solid rgba(255,226,52,.35);border-radius:10px;padding:10px 14px;font-size:16px;font-weight:900;color:#FFE234;font-family:'Black Han Sans','Arial Black',Arial;outline:none;transition:border-color .2s,box-shadow .2s;}
  .ni:focus{border-color:#FFE234;box-shadow:0 0 12px rgba(255,226,52,.3);}
  .ni::placeholder{color:rgba(255,255,255,.3);font-weight:400;}
  @keyframes diagonalScroll{0%{background-position:0 0}100%{background-position:130px 130px}}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
  @keyframes slideIn{from{transform:scale(.3) translateY(60px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
  @keyframes pulse{0%,100%{box-shadow:0 0 20px #FFE234aa}50%{box-shadow:0 0 40px #FFE234,0 0 80px #FFB800aa}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
</style>

// ── 배경 ──────────────────────────────────────────────────────────────────
function BgDecor(){
  return(
    <div style={{position:"fixed",inset:0,pointerEvents:"none",zIndex:0,overflow:"hidden"}}>
      <div style={{position:"absolute",inset:0,background:"#0248BB"}}/>
      <div style={{position:"absolute",inset:"-120px",backgroundImage:`url(data:image/png;base64,${SKULL_B64})`,backgroundSize:"130px 130px",backgroundRepeat:"repeat",opacity:0.1,animation:"diagonalScroll 16s linear infinite"}}/>
    </div>
  );
}

// ── 아바타 (이름 첫 글자 원형 뱃지) ───────────────────────────────────────
function Avatar({name,color,size}){
  return(
    <div style={{width:size,height:size,borderRadius:"50%",background:`linear-gradient(135deg,${color}ee,${color}88)`,border:`3px solid ${color}`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,boxShadow:`0 4px 12px rgba(0,0,0,.45),inset 0 1px 0 rgba(255,255,255,.2)`}}>
      <span style={{fontSize:Math.round(size*.42),fontWeight:900,color:"#fff",textShadow:"0 2px 4px rgba(0,0,0,.9)",fontFamily:"'Black Han Sans','Arial Black',Arial",lineHeight:1,userSelect:"none"}}>
        {name.charAt(0)}
      </span>
    </div>
  );
}

// ── 당첨 오버레이 ─────────────────────────────────────────────────────────
function WinOverlay({entry,onClose}){
  const [v,setV]=useState(false);
  useEffect(()=>{const t=setTimeout(()=>setV(true),40);return()=>clearTimeout(t);},[]);
  const P=["#FFD700","#FF6B6B","#48DBFB","#FF9FF3","#1DD1A1","#FF9F43","#A29BFE","#FD79A8","#55EFC4","#FDCB6E","#E84393","#0984E3","#6C5CE7","#00CEC9","#E17055","#74B9FF"];
  return(
    <div onClick={onClose} style={{position:"fixed",inset:0,zIndex:300,background:"rgba(5,15,40,.93)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",cursor:"pointer",backdropFilter:"blur(10px)",WebkitBackdropFilter:"blur(10px)"}}>
      {P.map((c,i)=>{
        const a=(i/P.length)*360,r=42,tx=Math.cos(a*Math.PI/180)*r,ty=Math.sin(a*Math.PI/180)*r;
        return<div key={i} style={{position:"absolute",top:"50%",left:"50%",width:12,height:12,borderRadius:"50%",background:c,boxShadow:`0 0 14px 4px ${c}`,opacity:v?1:0,transform:v?`translate(calc(-50% + ${tx}vw),calc(-50% + ${ty}vw))`:"translate(-50%,-50%) scale(0)",transition:`all .65s cubic-bezier(.22,1,.36,1) ${i*.028}s`}}/>;
      })}
      <div style={{textAlign:"center",animation:v?"slideIn .5s cubic-bezier(.34,1.56,.64,1) forwards":"none",opacity:v?1:0,padding:"0 24px",width:"100%",maxWidth:420}}>
        <div style={{background:"linear-gradient(180deg,#FFE234,#FFB800)",border:"3px solid #8B4500",borderRadius:16,padding:"6px 28px",display:"inline-block",marginBottom:20,boxShadow:"0 4px 0 #8B4500,0 6px 20px rgba(255,200,0,.5)"}}>
          <span style={{fontSize:22,fontWeight:900,color:"#5a2d00",letterSpacing:3,fontFamily:"'Black Han Sans','Arial Black',Arial"}}>🏆 당첨!</span>
        </div>
        <div style={{display:"flex",justifyContent:"center",marginBottom:20,animation:v?"pulse 2s ease-in-out infinite":undefined}}>
          <Avatar name={entry.name} color={entry.color} size={160}/>
        </div>
        <div style={{background:"linear-gradient(180deg,#1e5fa8,#0e3060)",border:"3px solid white",borderRadius:16,padding:"10px 36px",display:"inline-block",boxShadow:"0 5px 0 #091e3a",marginBottom:20}}>
          <span style={{fontSize:"clamp(24px,7vw,44px)",fontWeight:900,color:"#FFE234",fontFamily:"'Black Han Sans','Arial Black',Arial",textShadow:"0 2px 0 #8B4500"}}>{entry.name}</span>
        </div>
        <div style={{fontSize:12,color:"rgba(255,255,255,.4)",letterSpacing:3,fontFamily:"'Black Han Sans','Arial Black',Arial"}}>탭하여 닫기</div>
      </div>
    </div>
  );
}

// ── 슬롯 룰렛 ────────────────────────────────────────────────────────────
function SlotRoulette({entries,onResult,isPC}){
  const [spinning,setSpinning]=useState(false);
  const [offset,setOffset]=useState(0);
  const [revealed,setRevealed]=useState(false);
  const [revealEntry,setRevealEntry]=useState(null);
  const animRef=useRef(null);
  const offsetRef=useRef(0);
  const IW=isPC?155:115,VIS=isPC?5:3;
  const ext=[...entries,...entries,...entries,...entries,...entries,...entries,...entries];
  const asz=isPC?90:70,ih=isPC?160:128;

  const spin=()=>{
    if(spinning||entries.length<2)return;
    setSpinning(true);setRevealed(false);setRevealEntry(null);
    const loopW=entries.length*IW;
    const norm=-((((-offsetRef.current)%loopW)+loopW)%loopW);
    offsetRef.current=norm;setOffset(norm);
    const s0=norm,wi=entries.length*4+Math.floor(Math.random()*entries.length);
    const co=-(wi*IW-(VIS*IW)/2+IW/2),td=co-s0,dur=3000+Math.random()*1400,t0=performance.now();
    const ease=t=>1-Math.pow(1-t,4);
    const anim=now=>{
      const p=Math.min((now-t0)/dur,1),cur=s0+td*ease(p);
      offsetRef.current=cur;setOffset(cur);
      if(p<1)animRef.current=requestAnimationFrame(anim);
      else{const winner=entries[wi%entries.length];setSpinning(false);setRevealEntry(winner);setRevealed(true);setTimeout(()=>onResult(winner),500);}
    };
    animRef.current=requestAnimationFrame(anim);
  };

  return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:isPC?32:24}}>
      <div style={{position:"relative",width:IW*VIS}}>
        <div style={{position:"absolute",top:-14,left:"50%",transform:"translateX(-50%)",zIndex:10}}>
          <svg width="32" height="28" viewBox="0 0 32 28"><polygon points="16,28 0,0 32,0" fill="#FFE234" stroke="#8B4500" strokeWidth="2"/></svg>
        </div>
        <div style={{width:"100%",overflow:"hidden",borderRadius:20,border:"4px solid #FFE234",background:"#06060F",position:"relative",boxShadow:"0 0 0 2px #8B4500,0 0 40px rgba(255,220,50,.2),inset 0 0 40px rgba(0,0,0,.8)"}}>
          <div style={{position:"absolute",inset:0,zIndex:2,pointerEvents:"none",background:"linear-gradient(to right,#06060F 0%,transparent 20%,transparent 80%,#06060F 100%)"}}/>
          <div style={{position:"absolute",left:"50%",top:0,bottom:0,transform:"translateX(-50%)",width:IW,border:"4px solid #FFE234",borderRadius:14,zIndex:3,pointerEvents:"none",boxShadow:revealed?"0 0 40px #FFE234,0 0 60px rgba(255,220,50,0.5),inset 0 0 20px rgba(255,220,50,0.15)":spinning?"0 0 20px rgba(255,220,50,.3)":"0 0 16px rgba(255,220,50,.4)",transition:"box-shadow .4s"}}/>
          {revealed&&revealEntry&&(
            <div style={{position:"absolute",left:"50%",top:"50%",transform:"translate(-50%,-50%)",width:IW-8,zIndex:4,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:8,animation:"popIn 0.4s cubic-bezier(0.34,1.56,0.64,1)"}}>
              <Avatar name={revealEntry.name} color={revealEntry.color} size={asz}/>
              <span style={{color:"#FFE234",fontSize:isPC?13:10,fontWeight:900,textAlign:"center",fontFamily:"'Black Han Sans','Arial Black',Arial",maxWidth:IW-12,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",textShadow:"0 1px 4px rgba(0,0,0,.8)"}}>{revealEntry.name}</span>
            </div>
          )}
          <div style={{display:"flex",transform:`translateX(${offset}px)`,willChange:"transform",padding:"14px 0",filter:spinning?"blur(8px) brightness(0.4)":"blur(6px) brightness(0.5)",transition:"filter 0.1s"}}>
            {ext.map((entry,i)=>(
              <div key={i} style={{minWidth:IW,height:ih,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:8,padding:"0 6px"}}>
                <Avatar name={entry.name} color={entry.color} size={asz}/>
                <span style={{color:"#FFE234",fontSize:isPC?13:10,fontWeight:900,textAlign:"center",fontFamily:"'Black Han Sans','Arial Black',Arial",maxWidth:IW-12,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",textShadow:"0 1px 4px rgba(0,0,0,.8)"}}>{entry.name}</span>
              </div>
            ))}
          </div>
        </div>
        <div style={{position:"absolute",bottom:-14,left:"50%",transform:"translateX(-50%)",zIndex:10}}>
          <svg width="32" height="28" viewBox="0 0 32 28"><polygon points="16,0 0,28 32,28" fill="#FFE234" stroke="#8B4500" strokeWidth="2"/></svg>
        </div>
      </div>
      <button className="bb" onClick={spin} disabled={spinning||entries.length<2}
        style={{padding:isPC?"18px 80px":"15px 60px",fontSize:isPC?22:19,letterSpacing:2,borderRadius:50,minWidth:isPC?260:200}}>
        {spinning?"⏳ 돌아가는 중…":"🎰 추첨 돌리기!"}
      </button>
    </div>
  );
}

// ── 히스토리 ──────────────────────────────────────────────────────────────
function History({items,isPC}){
  if(!items.length)return null;
  return(
    <div className="card" style={{padding:16}}>
      <div style={{marginBottom:10}}><span className="lbl">📋 최근 결과</span></div>
      <div style={{display:"flex",flexDirection:"column",gap:6}}>
        {items.map((h,i)=>(
          <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 12px",borderRadius:10,background:i===0?"rgba(255,220,50,.12)":"rgba(255,255,255,.04)",border:i===0?"2px solid #FFE23466":"2px solid transparent"}}>
            <Avatar name={h.entry.name} color={h.entry.color} size={28}/>
            <span style={{fontWeight:900,fontSize:isPC?14:13,flex:1,color:i===0?"#FFE234":"#aaa",fontFamily:"'Black Han Sans','Arial Black',Arial"}}>{i===0&&"🏆 "}{h.entry.name}</span>
            <span style={{fontSize:10,color:"#556"}}>{h.time}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── 메인 앱 ──────────────────────────────────────────────────────────────
function App(){
  const [isPC,setIsPC]=useState(false);
  const [inputText,setInputText]=useState('');
  const [entries,setEntries]=useState([]);
  const [eliminated,setEliminated]=useState(new Set());
  const [eliminateMode,setEliminateMode]=useState(false);
  const [history,setHistory]=useState([]);
  const [winOverlay,setWinOverlay]=useState(null);

  const activeEntries=entries.filter(e=>!eliminated.has(e.id));

  const addEntry=()=>{
    const name=inputText.trim();
    if(!name||entries.length>=32)return;
    setEntries(prev=>[...prev,{id:Date.now()+Math.random(),name,color:PALETTE[prev.length%PALETTE.length]}]);
    setInputText('');
  };

  const removeEntry=(id)=>{
    setEntries(prev=>prev.filter(e=>e.id!==id));
    setEliminated(prev=>{const n=new Set(prev);n.delete(id);return n;});
  };

  const clearAll=()=>{setEntries([]);setEliminated(new Set());setHistory([]);setWinOverlay(null);};

  const handleResult=useCallback((entry)=>{
    setHistory(h=>[{entry,time:new Date().toLocaleTimeString("ko-KR")},...h].slice(0,8));
    setTimeout(()=>setWinOverlay(entry),350);
    if(eliminateMode)setEliminated(s=>new Set([...s,entry.id]));
  },[eliminateMode]);

  const resetEliminated=()=>setEliminated(new Set());
  const handleKey=(e)=>{if(e.key==="Enter")addEntry();};

  // ── 설정 / 입력 섹션 ──────────────────────────────────────────────────
  const inputSection=(
    <div style={{display:"flex",flexDirection:"column",gap:12}}>

      {/* 이름 입력 카드 */}
      <div className="card" style={{padding:16}}>
        <div style={{marginBottom:10}}><span className="lbl">✏️ 이름 추가 ({entries.length}/32)</span></div>
        <div style={{display:"flex",gap:8,alignItems:"stretch"}}>
          <input className="ni" type="text" value={inputText}
            onChange={e=>setInputText(e.target.value)}
            onKeyDown={handleKey}
            placeholder="이름 입력 후 Enter"
            maxLength={10}
            style={{flex:1,minWidth:0}}
          />
          <button className="bb" onClick={addEntry}
            disabled={!inputText.trim()||entries.length>=32}
            style={{padding:"0 18px",fontSize:22,borderRadius:10,flexShrink:0,height:44}}>+</button>
        </div>
        {entries.length===0&&(
          <p style={{fontSize:11,color:"#88aacc",marginTop:8,textAlign:"center"}}>최소 2명 이상 추가하면 추첨을 시작할 수 있어요</p>
        )}
      </div>

      {/* 당첨 모드 토글 */}
      <div className="card" style={{padding:"12px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:12}}>
        <div style={{flex:1,minWidth:0}}>
          <div style={{marginBottom:4}}><span className="lbl">당첨 모드</span></div>
          <div style={{fontSize:11,color:"#88aacc",marginTop:2}}>
            {eliminateMode?"🗑️ 제거 모드 — 당첨자를 다음 추첨에서 제외":"♻️ 유지 모드 — 반복 추첨 가능"}
          </div>
          {eliminateMode&&eliminated.size>0&&(
            <div style={{fontSize:11,color:"#FF6B6B",marginTop:4}}>
              {eliminated.size}명 제거됨 ·{" "}
              <span onClick={resetEliminated} style={{color:"#FFE234",textDecoration:"underline",cursor:"pointer"}}>리셋</span>
            </div>
          )}
        </div>
        <div className="tog" onClick={()=>{setEliminateMode(m=>!m);resetEliminated();}}
          style={{background:eliminateMode?"linear-gradient(180deg,#FF5252,#CC1111)":"linear-gradient(180deg,#334,#223)"}}>
          <div className="tog-k" style={{left:eliminateMode?30:4}}/>
        </div>
      </div>

      {/* 참여 명단 */}
      {entries.length>0&&(
        <div className="card" style={{padding:16}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
            <span className="lbl">👥 참여 명단 ({activeEntries.length}명 활성)</span>
            <button className="bbr" onClick={clearAll} style={{padding:"4px 12px",fontSize:11,borderRadius:8}}>전체 삭제</button>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:6,maxHeight:300,overflowY:"auto",paddingRight:2}}>
            {entries.map((entry,idx)=>{
              const isOut=eliminated.has(entry.id);
              return(
                <div key={entry.id}
                  style={{display:"flex",alignItems:"center",gap:10,padding:"7px 10px",borderRadius:10,
                    background:isOut?"rgba(255,0,0,.06)":`${entry.color}22`,
                    border:`2px solid ${isOut?"rgba(255,80,80,.25)":entry.color+"55"}`,
                    opacity:isOut?.4:1,transition:"all .2s",
                    animation:`fadeUp .25s ease ${idx*.04}s both`}}>
                  <Avatar name={entry.name} color={entry.color} size={30}/>
                  <span style={{flex:1,fontWeight:900,fontSize:13,color:isOut?"#666":"#FFE234",
                    textDecoration:isOut?"line-through":"none",
                    fontFamily:"'Black Han Sans','Arial Black',Arial",
                    overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                    {entry.name}
                  </span>
                  {isOut
                    ?<span style={{fontSize:13,flexShrink:0}}>❌</span>
                    :<button className="bbr" onClick={()=>removeEntry(entry.id)}
                        style={{padding:"2px 9px",fontSize:11,borderRadius:6,flexShrink:0,lineHeight:1.5}}>✕</button>
                  }
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );

  // ── 룰렛 섹션 ─────────────────────────────────────────────────────────
  const rouletteSection=(
    <div style={{display:"flex",flexDirection:"column",gap:20}}>
      {activeEntries.length<2?(
        <div style={{textAlign:"center",padding:"44px 0"}}>
          <div style={{fontSize:64,marginBottom:16,animation:"float 2s ease-in-out infinite"}}>🎯</div>
          <div className="card" style={{padding:"20px 32px",display:"inline-block"}}>
            <p style={{color:"#FFE234",fontWeight:900,fontSize:16,fontFamily:"'Black Han Sans','Arial Black',Arial"}}>
              {eliminateMode&&eliminated.size>0?"모든 이름이 제거됐어요!":"이름을 2명 이상 추가해주세요"}
            </p>
          </div>
          {eliminateMode&&eliminated.size>0&&(
            <div style={{marginTop:16}}>
              <button className="bb" onClick={resetEliminated} style={{padding:"12px 32px",fontSize:16}}>🔄 다시 시작</button>
            </div>
          )}
        </div>
      ):(
        <SlotRoulette key={activeEntries.map(e=>e.id).join(",")} entries={activeEntries} onResult={handleResult} isPC={isPC}/>
      )}
      <History items={history} isPC={isPC}/>
    </div>
  );

  return(
    <div style={{minHeight:"100vh",position:"relative",overflowX:"hidden",paddingBottom:48}}>
      <BgDecor/>
      {winOverlay&&<WinOverlay key={String(winOverlay.id)+Date.now()} entry={winOverlay} onClose={()=>setWinOverlay(null)}/>}

      {/* 헤더 */}
      <div style={{position:"relative",zIndex:10,textAlign:"center",padding:"16px 16px 14px",borderBottom:"3px solid rgba(255,220,50,.2)",background:"rgba(10,28,70,.75)",backdropFilter:"blur(8px)"}}>
        <img src={`data:image/png;base64,${LOGO_B64}`}
          style={{height:52,objectFit:"contain",display:"block",margin:"0 auto 8px",filter:"drop-shadow(0 2px 6px rgba(0,0,0,.5))"}}/>
        <div style={{display:"inline-block",background:"linear-gradient(180deg,#1e5fa8,#0e3060)",border:"3px solid #FFE234",borderRadius:18,padding:"6px 24px",boxShadow:"0 5px 0 #8B4500,0 8px 24px rgba(0,0,0,.5)",marginBottom:4}}>
          <h1 style={{margin:0,fontSize:"clamp(18px,4.5vw,30px)",fontWeight:900,fontFamily:"'Black Han Sans','Arial Black',Arial",color:"#FFE234",textShadow:"0 2px 0 #8B4500",letterSpacing:2,lineHeight:1.1}}>이름 뽑기 룰렛</h1>
        </div>
        <p style={{margin:"4px 0 0",fontSize:11,color:"#88aacc",letterSpacing:2,fontFamily:"'Black Han Sans','Arial Black',Arial"}}>이름을 추가하고 추첨하세요</p>
        <p style={{margin:"2px 0 0",fontSize:9,color:"#334",letterSpacing:1}}>v1.2</p>
        <button className="bb2" onClick={()=>setIsPC(p=>!p)}
          style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",padding:"7px 12px",fontSize:12,borderRadius:10}}>
          {isPC?"📱":"🖥️"}
        </button>
      </div>

      {/* 콘텐츠 */}
      <div style={{position:"relative",zIndex:5}}>
        {isPC?(
          <div style={{display:"grid",gridTemplateColumns:"1fr 400px",gap:28,padding:"32px 40px",maxWidth:1300,margin:"0 auto",alignItems:"start"}}>
            <div>{rouletteSection}</div>
            <div>{inputSection}</div>
          </div>
        ):(
          <div style={{padding:"24px 14px 0",display:"flex",flexDirection:"column",gap:14}}>
            {rouletteSection}
            {inputSection}
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
