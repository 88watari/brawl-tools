  .card{background:linear-gradient(180deg,#1e5fa8,#143d73);border:3px solid #0a2a52;border-radius:18px;box-shadow:0 4px 0 #091e3a,0 6px 20px rgba(0,0,0,.4);}

function BgDecor(){
  return(
    <div style={{position:"fixed",inset:0,pointerEvents:"none",zIndex:0,overflow:"hidden"}}>
      <div style={{position:"absolute",inset:0,background:"linear-gradient(160deg,#0e2a5e 0%,#1a3a7a 40%,#0e1f4a 100%)"}}/>
      <div style={{position:"absolute",top:"-10%",left:"50%",transform:"translateX(-50%)",width:"80%",height:"40%",background:"radial-gradient(ellipse,rgba(255,220,50,0.12) 0%,transparent 70%)"}}/>
      {Array.from({length:12},(_,i)=>(
        <div key={i} style={{position:"absolute",left:`${5+i*8}%`,top:`${3+(i%5)*18}%`,width:6+i%4*3,height:6+i%4*3,animation:`twinkle ${2+i%3}s ease-in-out ${i*0.3}s infinite`}}>

        </div>
      ))}
    </div>
  );
}

  return(
    <div style={{position:"fixed",inset:0,zIndex:300,background:"rgba(5,15,40,0.93)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",backdropFilter:"blur(10px)",WebkitBackdropFilter:"blur(10px)"}}>
      {P.map((c,i)=>{const a=(i/P.length)*360,r=40,tx=Math.cos(a*Math.PI/180)*r,ty=Math.sin(a*Math.PI/180)*r;return<div key={i} style={{position:"absolute",top:"50%",left:"50%",width:12,height:12,borderRadius:"50%",background:c,boxShadow:`0 0 14px 4px ${c}`,opacity:v?1:0,transform:v?`translate(calc(-50% + ${tx}vw),calc(-50% + ${ty}vw))`:"translate(-50%,-50%) scale(0)",transition:`all .65s cubic-bezier(.22,1,.36,1) ${i*.028}s`}}/>;
      })}
      <div style={{textAlign:"center",opacity:v?1:0,transform:v?"scale(1) translateY(0)":"scale(.2) translateY(80px)",transition:"all .5s cubic-bezier(.34,1.56,.64,1)",padding:"0 20px",width:"100%",maxWidth:400}}>
        <div style={{background:"linear-gradient(180deg,#FFE234,#FFB800)",border:"3px solid #8B4500",borderRadius:16,padding:"6px 24px",display:"inline-block",marginBottom:16,boxShadow:"0 4px 0 #8B4500"}}>
          <span style={{fontSize:18,fontWeight:900,color:"#5a2d00",letterSpacing:2}}>🏆 부전승 {currentBye}/{byeCount}</span>
        </div>
        <div style={{width:200,height:200,borderRadius:40,background:`linear-gradient(135deg,${team.color}ee,${team.color}88)`,border:"5px solid white",boxShadow:`0 0 0 4px ${team.color}88,0 0 60px ${team.color}88,0 20px 60px rgba(0,0,0,.6)`,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 16px",position:"relative",padding:28,animation:v?"pulse 2s ease-in-out infinite":undefined}}>
          {getIcon(team.idx,"white")}
          <div style={{position:"absolute",bottom:-2,left:"50%",transform:"translateX(-50%)",background:"linear-gradient(180deg,#1e5fa8,#0e3060)",border:`2px solid ${team.color}`,borderRadius:20,padding:"4px 16px",whiteSpace:"nowrap",boxShadow:"0 3px 0 #091e3a"}}>
            <span style={{fontSize:15,fontWeight:900,color:"#FFE234"}}>{team.name}</span>
          </div>
        </div>
        <div style={{background:"linear-gradient(180deg,#1e5fa8,#0e3060)",border:"3px solid white",borderRadius:16,padding:"10px 32px",display:"inline-block",boxShadow:"0 5px 0 #091e3a",marginBottom:12}}>
          <span style={{fontSize:"clamp(28px,7vw,44px)",fontWeight:900,color:"#FFE234",textShadow:"0 2px 0 #8B4500"}}>{team.name}</span>
        </div>
        <div style={{fontSize:13,color:"rgba(255,255,255,.5)",marginBottom:28}}>부전승 확정! 🎉</div>
        {!isLast
          ?<button className="bb" onClick={onNext} style={{padding:"14px 44px",fontSize:17,letterSpacing:1,borderRadius:50}}>다음 부전승 뽑기 →</button>
          :<button className="bbg" onClick={onNext} style={{padding:"14px 44px",fontSize:17,letterSpacing:1,borderRadius:50}}>완료 ✓</button>
        }
      </div>
    </div>
  );
}

// ── 슬롯 룰렛 ────────────────────────────────────────────────────────────
function SlotRoulette({teams,onResult,isPC}){
  const [spinning,setSpinning]=useState(false);
  const [offset,setOffset]=useState(0);
  const animRef=useRef(null);
  const offsetRef=useRef(0);
  const IW=isPC?145:112,VIS=isPC?5:3;
  const ext=[...teams,...teams,...teams,...teams,...teams,...teams,...teams];

  const spin=()=>{
    if(spinning||teams.length<2)return;
    setSpinning(true);
    const s0=offsetRef.current,wi=teams.length*3+Math.floor(Math.random()*teams.length);
    const co=-(wi*IW-(VIS*IW)/2+IW/2),td=co-s0,dur=3000+Math.random()*1400,t0=performance.now();
    const ease=t=>1-Math.pow(1-t,4);
    const anim=now=>{
      const p=Math.min((now-t0)/dur,1),cur=s0+td*ease(p);
      offsetRef.current=cur;setOffset(cur);
      if(p<1)animRef.current=requestAnimationFrame(anim);
      else{setSpinning(false);onResult(teams[wi%teams.length]);}
    };
    animRef.current=requestAnimationFrame(anim);
  };

  const isz=isPC?90:70,ih=isPC?155:130;
  return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:isPC?32:24}}>
      <div style={{position:"relative",width:IW*VIS}}>
        <div style={{position:"absolute",top:-14,left:"50%",transform:"translateX(-50%)",zIndex:10}}>
          <svg width="32" height="28" viewBox="0 0 32 28"><polygon points="16,28 0,0 32,0" fill="#FFE234" stroke="#8B4500" strokeWidth="2"/></svg>
        </div>
        <div style={{width:"100%",overflow:"hidden",borderRadius:20,border:"4px solid #FFE234",background:"#06060F",position:"relative",boxShadow:"0 0 0 2px #8B4500,0 0 40px rgba(255,220,50,.2),inset 0 0 40px rgba(0,0,0,.8)"}}>
          <div style={{position:"absolute",inset:0,zIndex:2,pointerEvents:"none",background:"linear-gradient(to right,#06060F 0%,transparent 20%,transparent 80%,#06060F 100%)"}}/>
          <div style={{position:"absolute",left:"50%",top:0,bottom:0,transform:"translateX(-50%)",width:IW,border:"4px solid #FFE234",borderRadius:14,zIndex:3,pointerEvents:"none",boxShadow:spinning?"0 0 40px #FFE234,inset 0 0 20px rgba(255,220,50,.1)":"0 0 16px rgba(255,220,50,.4)",transition:"box-shadow .3s"}}/>
          <div style={{display:"flex",transform:`translateX(${offset}px)`,willChange:"transform",padding:"14px 0"}}>
            {ext.map((team,i)=>(
              <div key={i} style={{minWidth:IW,height:ih,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:6}}>
                <div style={{width:isz,height:isz,borderRadius:isPC?22:16,background:`linear-gradient(135deg,${team.color}bb,${team.color}66)`,border:`3px solid ${team.color}99`,display:"flex",alignItems:"center",justifyContent:"center",padding:isPC?14:10,position:"relative",boxShadow:"0 4px 12px rgba(0,0,0,.5)"}}>
                  {getIcon(team.idx,"white")}
                  <div style={{position:"absolute",bottom:-10,left:"50%",transform:"translateX(-50%)",background:team.color,borderRadius:10,padding:"2px 10px",whiteSpace:"nowrap",fontSize:isPC?11:9,fontWeight:900,color:"white",boxShadow:"0 2px 6px rgba(0,0,0,.5)",border:"1.5px solid rgba(255,255,255,.3)"}}>
                    {team.name}
                  </div>
                </div>
                <span style={{color:"#FFE234",fontSize:isPC?12:10,fontWeight:900,textAlign:"center",fontFamily:"'Black Han Sans','Arial Black',Arial",marginTop:12,textShadow:"0 1px 4px rgba(0,0,0,.8)"}}>{team.name}</span>
              </div>
            ))}
          </div>
        </div>
        <div style={{position:"absolute",bottom:-14,left:"50%",transform:"translateX(-50%)",zIndex:10}}>
          <svg width="32" height="28" viewBox="0 0 32 28"><polygon points="16,0 0,28 32,28" fill="#FFE234" stroke="#8B4500" strokeWidth="2"/></svg>
        </div>
      </div>
      <button className="bb" onClick={spin} disabled={spinning||teams.length<2} style={{padding:isPC?"18px 80px":"15px 56px",fontSize:isPC?22:19,letterSpacing:2,borderRadius:50}}>
        {spinning?"⏳ 추첨 중…":"🎰 부전승 추첨!"}
      </button>
    </div>
  );
}

// ── 숫자 입력 ─────────────────────────────────────────────────────────────
function NumInput({value,onChange,min,max,label,sub}){
  return(
    <div className="card" style={{padding:"12px 14px 18px",overflow:"hidden"}}>
      <div style={{marginBottom:8}}><span className="lbl">{label}</span></div>
      <div style={{display:"flex",alignItems:"center",gap:8}}>
        <button className="bb" onClick={()=>onChange(value-1)} style={{width:38,height:38,padding:0,fontSize:22,borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>−</button>
        <input type="number" value={value} onChange={e=>onChange(Number(e.target.value)||min)} style={{flex:1,minWidth:0,textAlign:"center",background:"rgba(0,0,0,.3)",border:"2px solid #FFE23466",borderRadius:8,padding:"8px 0",fontSize:22,fontWeight:900,color:"#FFE234",fontFamily:"'Black Han Sans','Arial Black',Arial",outline:"none"}}/>
        <button className="bb" onClick={()=>onChange(value+1)} style={{width:38,height:38,padding:0,fontSize:22,borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>+</button>
      </div>
      {sub&&<div style={{fontSize:10,color:"#88aacc",marginTop:6,textAlign:"center"}}>{sub}</div>}
    </div>
  );
}

// ── PC 토글 버튼 (공통) ────────────────────────────────────────────────────
function PCToggle({isPC,onToggle}){
  return(
    <button className="bb2" onClick={onToggle}
      style={{padding:"8px 16px",fontSize:13,borderRadius:12,whiteSpace:"nowrap"}}>
      {isPC?"📱 모바일 전환":"🖥️ PC 전환"}
    </button>
  );
}

// ── 메인 앱 (isPC를 최상위에서 단독 관리) ────────────────────────────────
function App(){
  // ★ isPC를 App 최상위에서 관리 — 모든 화면이 이 값을 공유
  const [isPC,setIsPC]=useState(false);
  const togglePC=()=>setIsPC(p=>!p);

  const [phase,setPhase]=useState("setup");
  const [teams,setTeams]=useState([]);
  const [remaining,setRemaining]=useState([]);
  const [byeCount,setByeCount]=useState(1);
  const [byeWinners,setByeWinners]=useState([]);
  const [currentBye,setCurrentBye]=useState(1);
  const [winOverlay,setWinOverlay]=useState(null);
  const [rouletteKey,setRouletteKey]=useState(0);
  const [teamCount,setTeamCount]=useState(16);
  const [byeCountInput,setByeCountInput]=useState(1);

  const handleStart=()=>{
    const newTeams=Array.from({length:teamCount},(_,i)=>({idx:i,name:`${i+1}팀`,color:TEAM_COLORS[i%TEAM_COLORS.length]}));
    setTeams(newTeams);setRemaining([...newTeams]);setByeCount(byeCountInput);
    setByeWinners([]);setCurrentBye(1);setPhase("roulette");setRouletteKey(k=>k+1);
  };
  const handleResult=useCallback(team=>{setTimeout(()=>setWinOverlay(team),350);},[]);
  const handleNext=()=>{
    const w=winOverlay,nw=[...byeWinners,w];
    setByeWinners(nw);setRemaining(r=>r.filter(t=>t.idx!==w.idx));setWinOverlay(null);
    if(nw.length<byeCount){setCurrentBye(c=>c+1);setRouletteKey(k=>k+1);}
    else setPhase("done");
  };
  const handleReset=()=>{setPhase("setup");setByeWinners([]);setWinOverlay(null);};

  const handleTeamCount=v=>{const n=Math.max(2,Math.min(64,Number(v)||2));setTeamCount(n);if(byeCountInput>=n)setByeCountInput(n-1);};
  const handleByeCountInput=v=>setByeCountInput(Math.max(1,Math.min(teamCount-1,Number(v)||1)));

  // ── 공통 헤더 ─────────────────────────────────────────────────────────
  const Header=({title,extra})=>(
    <div style={{position:"relative",zIndex:10,background:"rgba(10,28,70,.8)",backdropFilter:"blur(8px)",borderBottom:"3px solid rgba(255,220,50,.2)",padding:"16px 16px 12px"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:10,flexWrap:"wrap"}}>
        {extra&&<div style={{position:"absolute",left:12}}>{extra}</div>}
        <div style={{background:"linear-gradient(180deg,#1e5fa8,#0e3060)",border:"3px solid #FFE234",borderRadius:14,padding:"8px 20px",boxShadow:"0 4px 0 #8B4500"}}>
          <h1 style={{margin:0,fontSize:"clamp(16px,4vw,26px)",fontWeight:900,color:"#FFE234",textShadow:"0 2px 0 #8B4500",letterSpacing:1,whiteSpace:"nowrap"}}>{title}</h1>
        </div>
        {/* ★ PC 토글 항상 헤더 오른쪽에 고정 */}
        <div style={{position:"absolute",right:12}}>
          <PCToggle isPC={isPC} onToggle={togglePC}/>
        </div>
      </div>
    </div>
  );

  // ── 설정 화면 ──────────────────────────────────────────────────────────
  if(phase==="setup") return(
    <div style={{minHeight:"100vh",position:"relative"}}>
      <BgDecor/>
      {/* 설정화면 헤더 - PC/모바일 토글 없음 */}
      <div style={{position:"relative",zIndex:10,background:"rgba(10,28,70,.8)",backdropFilter:"blur(8px)",borderBottom:"3px solid rgba(255,220,50,.2)",padding:"16px 16px 12px",textAlign:"center"}}>
        <div style={{background:"linear-gradient(180deg,#1e5fa8,#0e3060)",border:"3px solid #FFE234",borderRadius:14,padding:"8px 24px",display:"inline-block",boxShadow:"0 4px 0 #8B4500"}}>
          <h1 style={{margin:0,fontSize:"clamp(18px,5vw,28px)",fontWeight:900,color:"#FFE234",textShadow:"0 2px 0 #8B4500",letterSpacing:1}}>🏆 부전승 룰렛</h1>
        </div>
        <p style={{margin:"6px 0 0",fontSize:11,color:"#88aacc",letterSpacing:2}}>토너먼트 부전승 추첨</p>
      </div>
      <div style={{position:"relative",zIndex:5,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"calc(100vh - 90px)",padding:"24px 40px"}}>
        <div style={{width:"100%",maxWidth:260,display:"flex",flexDirection:"column",gap:12}}>
          <NumInput value={teamCount} onChange={handleTeamCount} min={2} max={64} label="참가 팀 수" sub="2 ~ 64팀"/>
          <NumInput value={byeCountInput} onChange={handleByeCountInput} min={1} max={teamCount-1} label="부전승 팀 수" sub={`최대 ${teamCount-1}팀`}/>
          <div style={{background:"rgba(255,220,50,.08)",border:"2px solid rgba(255,220,50,.3)",borderRadius:12,padding:"10px 14px",textAlign:"center"}}>
            <span style={{fontSize:13,color:"#FFE234",fontWeight:900}}>{teamCount}개 팀 중 {byeCountInput}개 팀 부전승 추첨</span>
          </div>
          <button className="bb" onClick={handleStart} style={{padding:"14px 0",fontSize:18,letterSpacing:2,borderRadius:50,width:"100%"}}>추첨 시작 →</button>
          <p style={{textAlign:"center",fontSize:9,color:"#334"}}>v1.1</p>
        </div>
      </div>
    </div>
  );

  // ── 완료 화면 ──────────────────────────────────────────────────────────
  if(phase==="done") return(
    <div style={{minHeight:"100vh",position:"relative"}}>
      <BgDecor/>
      <Header title="🎊 추첨 완료!"/>
      <div style={{position:"relative",zIndex:5,display:"flex",flexDirection:"column",alignItems:"center",padding:"32px 24px",paddingBottom:48}}>
        <p style={{fontSize:12,color:"#88aacc",marginBottom:24}}>총 {byeWinners.length}팀 부전승 확정</p>
        <div style={{width:"100%",maxWidth:isPC?540:360,display:"flex",flexDirection:"column",gap:10,marginBottom:28}}>
          {byeWinners.map((t,i)=>(
            <div key={i} style={{display:"flex",alignItems:"center",gap:14,padding:"14px 18px",borderRadius:14,background:`linear-gradient(135deg,${t.color}44,${t.color}22)`,border:`3px solid ${t.color}88`,boxShadow:`0 3px 0 ${t.color}44`}}>
              <div style={{width:44,height:44,flexShrink:0}}>{getIcon(t.idx,"white")}</div>
              <div><div style={{fontSize:11,color:"#FFD700",fontWeight:900,letterSpacing:1}}>부전승 {i+1}</div><div style={{fontSize:isPC?22:18,color:"#fff",fontWeight:900}}>{t.name}</div></div>
              <div style={{marginLeft:"auto",fontSize:26}}>🏆</div>
            </div>
          ))}
        </div>
        <button className="bb" onClick={handleReset} style={{padding:"14px 48px",fontSize:17,letterSpacing:1,borderRadius:50}}>🔄 처음으로</button>
      </div>
    </div>
  );

  // ── 추첨 화면 ──────────────────────────────────────────────────────────
  const rouletteSection=(
    <div style={{display:"flex",flexDirection:"column",gap:20}}>
      {remaining.length<2
        ?<div style={{textAlign:"center",padding:"44px 0"}}><div className="card" style={{padding:"20px 32px",display:"inline-block"}}><p style={{color:"#FFE234",fontWeight:900,fontSize:16}}>남은 팀이 부족합니다.</p></div></div>
        :<SlotRoulette key={rouletteKey} teams={remaining} onResult={handleResult} isPC={isPC}/>
      }
      {byeWinners.length>0&&(
        <div className="card" style={{padding:16}}>
          <div style={{marginBottom:10}}><span className="lbl">✅ 부전승 확정</span></div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {byeWinners.map((t,i)=>(
              <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 12px",borderRadius:10,background:`${t.color}33`,border:`2px solid ${t.color}66`}}>
                <div style={{width:28,height:28,flexShrink:0}}>{getIcon(t.idx,"white")}</div>
                <span style={{fontWeight:900,fontSize:13,flex:1,color:"#FFE234"}}>🏆 {t.name}</span>
                <span style={{fontSize:11,color:"#aaa"}}>부전승 {i+1}</span>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );

  const statusSection=(
    <div className="card" style={{padding:16}}>
      <div style={{marginBottom:10}}><span className="lbl">전체 팀 현황</span></div>
      <div style={{display:"grid",gridTemplateColumns:isPC?"repeat(auto-fill,minmax(110px,1fr))":"repeat(auto-fill,minmax(88px,1fr))",gap:6}}>
        {teams.map(t=>{
          const isBye=byeWinners.some(w=>w.idx===t.idx);
          return(
            <div key={t.idx} style={{display:"flex",alignItems:"center",gap:6,padding:"7px 10px",borderRadius:10,background:isBye?`${t.color}33`:"rgba(255,255,255,.03)",border:`2px solid ${isBye?t.color+"99":"rgba(255,255,255,.06)"}`,opacity:isBye?1:0.45,transition:"all .3s"}}>
              <div style={{width:22,height:22,flexShrink:0}}>{getIcon(t.idx,"white")}</div>
              <span style={{fontSize:10,fontWeight:900,color:isBye?"#FFE234":"#aabbcc",whiteSpace:"nowrap"}}>{t.name}{isBye?" 🏆":""}</span>
            </div>
          );
        })}
      </div>
    </div>
  );

  return(
    <div style={{minHeight:"100vh",position:"relative",overflowX:"hidden",paddingBottom:40}}>
      <BgDecor/>
      {winOverlay&&<WinOverlay team={winOverlay} byeCount={byeCount} currentBye={currentBye} isLast={currentBye>=byeCount} onNext={handleNext}/>}
      <Header title="🏆 부전승 룰렛"
        extra={<button className="bb2" onClick={handleReset} style={{padding:"6px 14px",fontSize:11,borderRadius:10}}>← 설정</button>}
      />
      {/* 진행 정보 */}
      <div style={{position:"relative",zIndex:5,textAlign:"center",padding:"10px 16px 0",background:"rgba(10,28,70,.5)"}}>
        <div style={{fontSize:12,color:"#FFE234",fontWeight:900}}>{currentBye} / {byeCount} 추첨 중 · 남은 팀 {remaining.length}개</div>
        <div style={{margin:"6px auto 0",width:"60%",maxWidth:260,height:8,borderRadius:4,background:"rgba(0,0,0,.4)",border:"2px solid rgba(255,220,50,.2)",overflow:"hidden"}}>
          <div style={{height:"100%",borderRadius:2,background:"linear-gradient(90deg,#FFE234,#FF8C00)",width:`${((currentBye-1)/byeCount)*100}%`,transition:"width .4s",boxShadow:"0 0 8px #FFE234"}}/>
        </div>
      </div>
      {/* 콘텐츠 */}
      <div style={{position:"relative",zIndex:5,padding:isPC?"32px 40px":"24px 14px 0",maxWidth:isPC?1300:undefined,margin:isPC?"0 auto":undefined}}>
        {isPC
          ?<div style={{display:"grid",gridTemplateColumns:"1fr 380px",gap:28,alignItems:"start"}}><div>{rouletteSection}</div><div>{statusSection}</div></div>
          :<div style={{display:"flex",flexDirection:"column",gap:14}}>{rouletteSection}{statusSection}</div>
        }
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
